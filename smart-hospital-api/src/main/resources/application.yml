spring:
  application:
    name: smart-hospital-api

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB

  autoconfigure:
    exclude:
      # Redis is not required until Phase 2 — exclude to prevent startup failure
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration
      # Mail is not required until notifications module is wired
      - org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/smarthospital}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        # search_path routing is handled by TenantAwareDataSource (JDBC proxy)
        # No Hibernate multi-tenancy API needed
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    out-of-order: false

app:
  jwt:
    secret: ${JWT_SECRET:dev-secret-key-change-in-prod-min32c}
    access-token-expiry-ms: 900000      # 15 minutes
    refresh-token-expiry-ms: 604800000  # 7 days
  token-store: memory                   # "memory" (dev) | "redis" (prod)
  upload:
    dir: ${UPLOAD_DIR:./uploads/photos}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] [tenant:%X{tenantId}] %-5level %logger{36} - %msg%n"
